<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pixel Pace</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1 class="app__title">Pixel Pace</h1>
      <p class="app__hint">Log each run with distance and time — pace fills in automatically.</p>

      <form class="form" id="runForm" novalidate>
        <label class="field">
          <span class="field__label">Distance (miles)</span>
          <input
            class="field__input"
            id="distance"
            name="distance"
            type="number"
            inputmode="decimal"
            min="0.01"
            step="0.01"
            placeholder="e.g. 3.1"
            required
            autocomplete="off"
          />
        </label>
        <label class="field">
          <span class="field__label">Time (minutes)</span>
          <input
            class="field__input"
            id="durationMin"
            name="durationMin"
            type="number"
            inputmode="decimal"
            min="0.01"
            step="0.1"
            placeholder="e.g. 28.5"
            required
            autocomplete="off"
          />
        </label>
        <p class="pace" aria-live="polite">
          Pace: <strong id="pacePreview">—</strong>
          <span class="pace__unit">min/mi</span>
        </p>
        <p class="form__err" id="formErr" role="alert" hidden></p>
        <button type="submit" class="btn" id="logRun">Log this run</button>
      </form>

      <section class="stage" aria-live="polite">
        <div class="runner-display" id="runner" data-tier="0">
          <img
            class="runner-display__img"
            id="runnerImg"
            src="assets/tier-0.png"
            alt="Couch Potato runner"
            width="200"
            height="250"
            decoding="async"
          />
        </div>
        <p class="tier" id="tierLabel">Couch Potato</p>
        <p class="count">Runs: <strong id="totalRuns">0</strong></p>
        <div class="averages" aria-live="polite">
          <p class="averages__row">
            Avg distance / run:
            <strong id="avgDist">—</strong> mi
          </p>
          <p class="averages__row">
            Avg time / run:
            <strong id="avgTime">—</strong> min
          </p>
          <p class="averages__row">
            Overall pace:
            <strong id="avgPace">—</strong>
            <span class="pace__unit">min/mi</span>
          </p>
        </div>
      </section>

      <div class="actions">
        <button type="button" class="btn btn--secondary" id="resetBtn">
          Reset progress
        </button>
      </div>
    </main>
    <script src="app.js" defer></script>
  </body>
</html>
