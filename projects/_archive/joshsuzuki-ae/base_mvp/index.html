<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Brick Breaker</title>
    <style>
      :root {
        --bg: #0e1118;
        --panel: #161b26;
        --panel-border: rgba(232, 234, 242, 0.12);
        --text: #e8eaf2;
        --muted: rgba(232, 234, 242, 0.62);
        --accent: #8ec5ff;
        --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial,
          sans-serif;
      }
      body {
        margin: 0;
        background: radial-gradient(ellipse 120% 80% at 50% -20%, #1a2744 0%, var(--bg) 55%);
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 15px;
        line-height: 1.45;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 24px 16px 32px;
        box-sizing: border-box;
      }
      .layout {
        display: flex;
        flex-wrap: wrap;
        gap: 24px;
        align-items: flex-start;
        justify-content: center;
        max-width: 900px;
      }
      .game-column {
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
      }
      canvas {
        background: #0f1628;
        border: 2px solid var(--panel-border);
        border-radius: 8px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      }
      .hint {
        font-size: 13px;
        color: var(--muted);
        text-align: center;
        max-width: 480px;
        margin: 0;
      }
      .scoreboard {
        width: 280px;
        padding: 20px 20px 18px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.25);
      }
      .scoreboard-section-title {
        margin: 0 0 10px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .leaderboard-block {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--panel-border);
      }
      .leaderboard-block .scoreboard-section-title {
        margin-bottom: 12px;
      }
      .lb-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .lb-row {
        display: grid;
        grid-template-columns: 22px 1fr;
        gap: 10px 12px;
        align-items: start;
        padding: 10px 0;
        border-bottom: 1px solid rgba(232, 234, 242, 0.06);
        font-size: 13px;
        line-height: 1.35;
      }
      .lb-row:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }
      .lb-row:first-child {
        padding-top: 2px;
      }
      .lb-row--empty {
        color: var(--muted);
        opacity: 0.45;
        font-size: 13px;
        grid-template-columns: 1fr;
        padding: 8px 0;
      }
      .lb-rank {
        font-size: 11px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        color: var(--muted);
        padding-top: 2px;
        letter-spacing: 0.02em;
      }
      .lb-body {
        min-width: 0;
      }
      .lb-line1 {
        margin-bottom: 4px;
      }
      .lb-name {
        display: block;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--accent);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 100%;
        line-height: 1.25;
      }
      .lb-line2 {
        font-size: 13px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.02em;
        color: var(--text);
        opacity: 0.88;
      }
      .lb-line2 span {
        color: var(--muted);
        font-weight: 500;
        font-size: 12px;
      }
      .status {
        margin: 18px 0 0;
        padding-top: 16px;
        border-top: 1px solid var(--panel-border);
        font-size: 13px;
        line-height: 1.5;
        font-weight: 500;
        color: var(--accent);
        min-height: 3.2em;
      }
      .player-setup {
        margin-bottom: 4px;
      }
      .player-setup label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .player-setup input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        font-size: 14px;
        font-family: inherit;
        border-radius: 8px;
        border: 1px solid var(--panel-border);
        background: rgba(0, 0, 0, 0.28);
        color: var(--text);
      }
      .player-setup input:focus {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }
      .player-playing {
        font-size: 14px;
        line-height: 1.45;
        margin-bottom: 16px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--panel-border);
      }
      .player-playing strong {
        color: var(--accent);
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      #player-attempt-line {
        font-size: 13px;
        color: var(--muted);
        font-weight: 500;
      }
      .player-summary {
        margin-bottom: 14px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--panel-border);
      }
      .player-summary-title {
        margin: 0 0 6px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .player-summary-body {
        margin: 0;
        font-size: 14px;
        line-height: 1.45;
        color: var(--text);
      }
      .player-summary-body strong {
        color: var(--accent);
        font-weight: 600;
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="game-column">
        <canvas id="game" width="480" height="360" tabindex="0" aria-label="Brick Breaker"></canvas>
        <p class="hint">
          Name yourself in the panel (you can rename after each game) · ← → or A D · Space or Enter · mouse
        </p>
      </div>
      <aside class="scoreboard" aria-label="Scoreboard">
        <div class="player-summary hidden" id="player-summary" aria-live="polite">
          <p class="player-summary-title">Last game</p>
          <p class="player-summary-body" id="player-summary-body"></p>
        </div>
        <div class="player-setup" id="player-setup">
          <label for="player-name" id="player-name-label">Your name</label>
          <input
            type="text"
            id="player-name"
            maxlength="24"
            placeholder="Enter name, then Space or Enter"
            autocomplete="username"
            spellcheck="false"
          />
        </div>
        <div class="player-playing hidden" id="player-playing" aria-live="polite">
          Playing as <strong id="player-display-name">—</strong><br />
          <span id="player-attempt-line">Attempt <span id="player-attempt">—</span></span>
        </div>
        <div class="leaderboard-block">
          <h3 class="scoreboard-section-title">Leaderboard</h3>
          <div id="hud-top" class="lb-list" role="list" aria-live="polite"></div>
        </div>
        <p id="hud-status" class="status" aria-live="polite">Press Space to Start</p>
      </aside>
    </div>
    <script>
      (function () {
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const W = canvas.width;
        const H = canvas.height;

        const BALL_R = 6;
        const BALL_SPEED = 3.4;
        const PADDLE_W = 80;
        const PADDLE_H = 12;
        const PADDLE_Y = H - 36;
        const PADDLE_SPEED = 5.5;
        /** How much paddle edge curves the ball (lower = gentler) */
        const PADDLE_ENGLISH = 1.6;
        const COLS = 5;
        const ROWS = 3;
        const PAD = 8;
        const TOP = 28;
        const GAP = 6;

        /** "Neon dusk" — top = sunset, mid = violet, bottom = deep sea */
        const BRICK_ROW_COLORS = ["#ff6b6b", "#a55eea", "#26de81"];

        const LS_TOP = "brickBreaker_top5";
        const LS_TRY = "brickBreaker_gameTry";

        /** @type {{ score: number; try: number; name: string; attempt: number }[]} */
        let topScores = [];
        /** Games ever started (persisted); current round try equals this value while playing. */
        let gameTry = 0;
        let currentGameTry = 0;

        let playerName = "";
        /** Runs with this name this session (1 = first game, 2 = first replay, …). */
        let sessionAttempt = 0;
        let currentGameAttempt = 0;

        let mode = "ready";
        let score = 0;
        const keys = { left: false, right: false };

        function normalizeScoreEntry(e) {
          if (!e || typeof e.score !== "number" || typeof e.try !== "number") return null;
          return {
            score: e.score,
            try: e.try,
            name: typeof e.name === "string" && e.name.trim().length ? e.name.trim().slice(0, 24) : "Player",
            attempt: typeof e.attempt === "number" && e.attempt >= 1 ? e.attempt : 1,
          };
        }

        function loadTopScores() {
          try {
            const raw = localStorage.getItem(LS_TOP);
            if (!raw) return [];
            const parsed = JSON.parse(raw);
            if (!Array.isArray(parsed)) return [];
            return parsed.map(normalizeScoreEntry).filter(Boolean).slice(0, 5);
          } catch {
            return [];
          }
        }

        function saveTopScores(list) {
          localStorage.setItem(LS_TOP, JSON.stringify(list.slice(0, 5)));
          topScores = list.slice(0, 5);
        }

        function loadGameTry() {
          const n = parseInt(localStorage.getItem(LS_TRY) || "0", 10);
          return Number.isFinite(n) && n >= 0 ? n : 0;
        }

        function saveGameTry(n) {
          localStorage.setItem(LS_TRY, String(n));
          gameTry = n;
        }

        function recordHighScore(finalScore, tryNum, name, attemptNum) {
          const merged = [
            ...topScores,
            {
              score: finalScore,
              try: tryNum,
              name: (name && name.trim()) || "Player",
              attempt: attemptNum >= 1 ? attemptNum : 1,
            },
          ];
          merged.sort((a, b) => b.score - a.score || b.try - a.try);
          saveTopScores(merged.slice(0, 5));
        }

        topScores = loadTopScores();
        gameTry = loadGameTry();

        const paddle = { x: W / 2 - PADDLE_W / 2, y: PADDLE_Y, w: PADDLE_W, h: PADDLE_H };
        const ball = { x: W / 2, y: PADDLE_Y - BALL_R - 2, r: BALL_R, vx: 1.2, vy: -BALL_SPEED };
        let bricks = [];

        function buildBricks() {
          bricks = [];
          const totalGap = GAP * (COLS - 1);
          const bw = Math.floor((W - 2 * PAD - totalGap) / COLS);
          const bh = 22;
          for (let row = 0; row < ROWS; row++) {
            for (let col = 0; col < COLS; col++) {
              bricks.push({
                x: PAD + col * (bw + GAP),
                y: TOP + row * (bh + GAP),
                w: bw,
                h: bh,
                row,
                alive: true,
              });
            }
          }
        }

        function aliveCount() {
          return bricks.filter((b) => b.alive).length;
        }

        function resetPositions() {
          paddle.x = W / 2 - PADDLE_W / 2;
          ball.x = paddle.x + PADDLE_W / 2;
          ball.y = paddle.y - BALL_R - 2;
          ball.vx = 1.2;
          ball.vy = -BALL_SPEED;
          const m = Math.hypot(ball.vx, ball.vy) || 1;
          ball.vx = (ball.vx / m) * BALL_SPEED;
          ball.vy = (ball.vy / m) * BALL_SPEED;
        }

        function getPlayerNameFromInput() {
          const el = document.getElementById("player-name");
          const v = (el && el.value) ? el.value.trim() : "";
          return v.length ? v.slice(0, 24) : "Player";
        }

        function startOrRestart() {
          const nextName = getPlayerNameFromInput();
          if (mode === "ready") {
            playerName = nextName;
            sessionAttempt = 1;
          } else if (mode === "won" || mode === "lost") {
            const prevName = playerName;
            playerName = nextName;
            if (nextName !== prevName) {
              sessionAttempt = 1;
            } else {
              sessionAttempt += 1;
            }
          }
          gameTry += 1;
          saveGameTry(gameTry);
          currentGameTry = gameTry;
          currentGameAttempt = sessionAttempt;
          buildBricks();
          score = 0;
          mode = "playing";
          resetPositions();
          canvas.focus();
        }

        function clampPaddle() {
          paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
        }

        function walls() {
          if (ball.x - ball.r < 0) {
            ball.x = ball.r;
            ball.vx *= -1;
          } else if (ball.x + ball.r > W) {
            ball.x = W - ball.r;
            ball.vx *= -1;
          }
          if (ball.y - ball.r < 0) {
            ball.y = ball.r;
            ball.vy *= -1;
          }
        }

        function paddleHit() {
          if (ball.vy < 0) return;
          const { x: px, y: py, w: pw, h: ph } = paddle;
          if (ball.y + ball.r < py) return;
          if (ball.y - ball.r > py + ph) return;
          if (ball.x + ball.r < px) return;
          if (ball.x - ball.r > px + pw) return;
          ball.y = py - ball.r;
          ball.vy *= -1;
          const cx = px + pw / 2;
          const offset = (ball.x - cx) / (pw / 2);
          ball.vx += offset * PADDLE_ENGLISH;
          const sp = Math.hypot(ball.vx, ball.vy) || 1;
          ball.vx = (ball.vx / sp) * BALL_SPEED;
          ball.vy = (ball.vy / sp) * BALL_SPEED;
        }

        function brickHit(brick) {
          if (!brick.alive) return false;
          const rx = brick.x,
            ry = brick.y,
            rw = brick.w,
            rh = brick.h;
          const bx = rx + rw / 2;
          const by = ry + rh / 2;
          const dx = ball.x - bx;
          const dy = ball.y - by;
          const hw = rw / 2 + ball.r;
          const hh = rh / 2 + ball.r;
          if (Math.abs(dx) >= hw || Math.abs(dy) >= hh) return false;
          const ox = hw - Math.abs(dx);
          const oy = hh - Math.abs(dy);
          if (ox < oy) {
            ball.x += dx > 0 ? ox : -ox;
            ball.vx *= -1;
          } else {
            ball.y += dy > 0 ? oy : -oy;
            ball.vy *= -1;
          }
          brick.alive = false;
          score += 1;
          return true;
        }

        function tick() {
          if (mode !== "playing") return;
          let move = 0;
          if (keys.left) move -= 1;
          if (keys.right) move += 1;
          paddle.x += move * PADDLE_SPEED;
          clampPaddle();

          ball.x += ball.vx;
          ball.y += ball.vy;
          walls();
          paddleHit();
          for (let i = 0; i < bricks.length; i++) {
            if (brickHit(bricks[i])) break;
          }
          if (aliveCount() === 0) {
            recordHighScore(score, currentGameTry, playerName, currentGameAttempt);
            mode = "won";
            return;
          }
          if (ball.y - ball.r > H) {
            recordHighScore(score, currentGameTry, playerName, currentGameAttempt);
            mode = "lost";
          }
        }

        const elTop = document.getElementById("hud-top");
        const elStatus = document.getElementById("hud-status");
        const elPlayerSetup = document.getElementById("player-setup");
        const elPlayerPlaying = document.getElementById("player-playing");
        const elPlayerSummary = document.getElementById("player-summary");
        const elSummaryBody = document.getElementById("player-summary-body");
        const elPlayerDisplayName = document.getElementById("player-display-name");
        const elPlayerAttempt = document.getElementById("player-attempt");
        const elNameLabel = document.getElementById("player-name-label");
        const elNameInput = document.getElementById("player-name");

        let lastHudMode = "ready";

        function updateHud() {
          if (mode === "ready") {
            elPlayerSummary.classList.add("hidden");
            elPlayerSetup.classList.remove("hidden");
            elPlayerPlaying.classList.add("hidden");
            elNameLabel.textContent = "Your name";
            elNameInput.placeholder = "Enter name, then Space or Enter";
          } else if (mode === "playing") {
            elPlayerSummary.classList.add("hidden");
            elPlayerSetup.classList.add("hidden");
            elPlayerPlaying.classList.remove("hidden");
            elPlayerDisplayName.textContent = playerName || "Player";
            elPlayerAttempt.textContent = String(currentGameAttempt);
          } else {
            elPlayerSummary.classList.remove("hidden");
            elPlayerSetup.classList.remove("hidden");
            elPlayerPlaying.classList.add("hidden");
            elNameLabel.textContent = "Name for next game";
            elNameInput.placeholder = "Keep or change your name — Space or Enter";
            elSummaryBody.replaceChildren();
            elSummaryBody.appendChild(document.createTextNode("Played as "));
            const nameStrong = document.createElement("strong");
            nameStrong.textContent = playerName || "Player";
            elSummaryBody.appendChild(nameStrong);
            elSummaryBody.appendChild(
              document.createTextNode(
                " · Attempt " + currentGameAttempt + " · Score " + score
              )
            );
            if (lastHudMode === "playing") {
              elNameInput.value = playerName;
              requestAnimationFrame(function () {
                elNameInput.focus();
              });
            }
          }

          elTop.replaceChildren();
          for (let i = 0; i < 5; i++) {
            const entry = topScores[i];
            if (entry) {
              const row = document.createElement("div");
              row.className = "lb-row";
              row.setAttribute("role", "listitem");

              const rank = document.createElement("span");
              rank.className = "lb-rank";
              rank.textContent = String(i + 1);

              const body = document.createElement("div");
              body.className = "lb-body";

              const line1 = document.createElement("div");
              line1.className = "lb-line1";
              const nm = document.createElement("span");
              nm.className = "lb-name";
              nm.textContent = entry.name;

              const line2 = document.createElement("div");
              line2.className = "lb-line2";
              line2.appendChild(document.createTextNode(String(entry.score) + " "));
              const pts = document.createElement("span");
              pts.textContent = "pts";
              line2.appendChild(pts);

              line1.appendChild(nm);

              body.appendChild(line1);
              body.appendChild(line2);
              row.appendChild(rank);
              row.appendChild(body);
              elTop.appendChild(row);
            } else {
              const empty = document.createElement("div");
              empty.className = "lb-row lb-row--empty";
              empty.setAttribute("role", "listitem");
              empty.textContent = "—";
              elTop.appendChild(empty);
            }
          }

          if (mode === "ready") {
            elStatus.textContent = "Enter your name · Space or Enter to start";
          } else if (mode === "won") {
            elStatus.textContent =
              "You Win — edit name if you want, then Space or Enter for the next game";
          } else if (mode === "lost") {
            elStatus.textContent =
              "Game Over — edit name if you want, then Space or Enter for the next game";
          } else {
            elStatus.textContent = "Clear all bricks!";
          }

          lastHudMode = mode;
        }

        function draw() {
          ctx.fillStyle = "#0f1628";
          ctx.fillRect(0, 0, W, H);
          for (const b of bricks) {
            if (!b.alive) continue;
            ctx.fillStyle = BRICK_ROW_COLORS[b.row % BRICK_ROW_COLORS.length];
            ctx.fillRect(b.x, b.y, b.w, b.h);
            ctx.strokeStyle = "rgba(0,0,0,0.2)";
            ctx.strokeRect(b.x + 0.5, b.y + 0.5, b.w - 1, b.h - 1);
          }
          ctx.fillStyle = "#7cb7ff";
          ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
          ctx.beginPath();
          ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
          ctx.fillStyle = "#f0ebe3";
          ctx.fill();

          updateHud();
        }

        function loop() {
          tick();
          draw();
          requestAnimationFrame(loop);
        }

        window.addEventListener("keydown", (e) => {
          const canStartOrRestart = mode === "ready" || mode === "won" || mode === "lost";
          if ((e.code === "Space" || e.code === "Enter") && canStartOrRestart) {
            e.preventDefault();
            startOrRestart();
            return;
          }
          if (mode !== "playing") return;
          if (e.code === "ArrowLeft" || e.key === "a" || e.key === "A") keys.left = true;
          if (e.code === "ArrowRight" || e.key === "d" || e.key === "D") keys.right = true;
        });
        window.addEventListener("keyup", (e) => {
          if (e.code === "ArrowLeft" || e.key === "a" || e.key === "A") keys.left = false;
          if (e.code === "ArrowRight" || e.key === "d" || e.key === "D") keys.right = false;
        });
        canvas.addEventListener("mousemove", (e) => {
          if (mode !== "playing") return;
          const r = canvas.getBoundingClientRect();
          const sx = (e.clientX - r.left) * (W / r.width);
          paddle.x = sx - paddle.w / 2;
          clampPaddle();
        });
        canvas.addEventListener("click", () => canvas.focus());

        buildBricks();
        resetPositions();
        elNameInput.focus();
        requestAnimationFrame(loop);
      })();
    </script>
  </body>
</html>
